name: Build and Deploy Zorora

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'config.docker.py'
      - 'gunicorn.conf.py'
      - 'requirements.txt'
      - 'ui/**'
      - 'engine/**'
      - 'tools/**'
      - 'workflows/**'
      - 'data/**'
      - '*.py'
      - '.github/workflows/build-and-deploy.yml'

env:
  AWS_REGION: af-south-1
  STAGE: prod
  ECR_REPO: ona-zorora
  CLUSTER_NAME: ona-zorora-prod
  SERVICE_NAME: ona-zorora-prod
  TASK_FAMILY: ona-zorora-prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      image_tag: ${{ steps.tag.outputs.IMAGE_TAG }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set ECR registry
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_ENV

      - name: Login to ECR
        run: aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

      - name: Get image tag
        id: tag
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          IMAGE_TAG="${STAGE}-${GIT_SHA}"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Build and push
        run: |
          docker build --platform linux/amd64 -t zorora:${IMAGE_TAG} .
          docker tag zorora:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
          docker tag zorora:${IMAGE_TAG} ${ECR_REGISTRY}/${ECR_REPO}:${STAGE}
          docker push ${ECR_REGISTRY}/${ECR_REPO}:${IMAGE_TAG}
          docker push ${ECR_REGISTRY}/${ECR_REPO}:${STAGE}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --force-new-deployment \
            --region $AWS_REGION
          echo "Service updated — new deployment triggered"
