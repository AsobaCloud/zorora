name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deployment-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install full profile
        run: |
          python -m pip install --upgrade pip
          pip install ".[full]"
          pip install pytest

      - name: Create CI config
        run: python .github/generate_ci_config.py

      - name: Run full test suite
        run: pytest -q
